apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels: { app: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      imagePullSecrets:
        - name: harbor-pull
      containers:
        - name: backend
          image: harbor.gotgan.live/gotgan/backend:latest
          ports:
            - { containerPort: 8080 }
          envFrom:
            # 운영 시크릿(TOSS_CLIENT_ID/SECRET, TELEGRAM_BOT_TOKEN/CHAT_ID) — git 미커밋
            - secretRef:
                name: gotgan-backend-secrets
          env:
            # 운영 프로파일 활성화 → application-live.yml(jar 내장)이 ${ENV} 시크릿을 바인딩
            - name: SPRING_PROFILES_ACTIVE
              value: live
            # --- DB (CNPG pg-app primary) ---
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://pg-app-rw.gotgan.svc.cluster.local:5432/gotgan
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: pg-app-app, key: username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: pg-app-app, key: password } }
            # --- OIDC: gotgan realm (프로덕션 override) ---
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI
              value: https://auth.gotgan.live/realms/gotgan
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID
              value: gotgan-web-bff
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: gotgan-backend-oidc, key: web-bff-secret } }
            - name: WEB_REDIRECT_URI
              value: https://app.gotgan.live/login/oauth2/code/keycloak
            - name: WEB_POST_LOGOUT_URI
              value: https://app.gotgan.live/
            # 프록시(ingress→nginx→backend) 뒤에서 redirect URI를 https://app.gotgan.live 로 생성
            - name: SERVER_FORWARD_HEADERS_STRATEGY
              value: framework
            # --- 모바일 resource-server JWT ---
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: https://auth.gotgan.live/realms/gotgan
            # JWKS(서명키) 조회는 Cloudflare(외부) 경유 시 지연으로 Spring의 짧은 read-timeout을
            # 초과해 [invalid_id_token] certs Read timed out → 로그인 실패. iss 검증/디스커버리/
            # authorization-uri는 public issuer 그대로 두고, 키 조회만 클러스터 내부 Keycloak으로.
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI
              value: http://keycloak-service.keycloak.svc.cluster.local:8080/realms/gotgan/protocol/openid-connect/certs
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://keycloak-service.keycloak.svc.cluster.local:8080/realms/gotgan/protocol/openid-connect/certs
            # 홈랩에 IPv6 egress 없음 + Cloudflare가 A/AAAA 동시 반환 → JVM IPv4 강제(잔여 외부호출 방어)
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.net.preferIPv4Stack=true"
            # --- 세션 스토어(Redis Sentinel HA, apps/redis) 접속 — application-live.yml 의 ${...} 주입 ---
            # endpoint/port 는 SPRING_DATASOURCE_URL 과 동일 원칙으로 여기(배포시 env)에 둔다.
            - name: REDIS_SENTINEL_MASTER
              value: mymaster
            - name: REDIS_SENTINEL_NODES
              value: rfs-gotgan-session.redis.svc.cluster.local:26379
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: gotgan-session-redis-auth, key: password } }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests: { cpu: 250m, memory: 768Mi }
            limits:   { cpu: "1",  memory: 1536Mi }
