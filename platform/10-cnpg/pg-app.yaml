# 앱(gotgan backend) 전용 PostgreSQL. primary + 1 replica. CDC-ready.
apiVersion: v1
kind: Namespace
metadata:
  name: gotgan
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-app
  namespace: gotgan
spec:
  instances: 2                       # 1 primary + 1 streaming replica
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  primaryUpdateStrategy: unsupervised
  storage:
    size: 20Gi
    storageClass: nfs-client
  monitoring:
    enablePodMonitor: false
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  postgresql:
    parameters:
      wal_level: logical             # CDC/Debezium → Kafka. publication/slot은 Debezium 연동 시 생성
      max_wal_senders: "10"
      max_replication_slots: "10"
  bootstrap:
    initdb:
      database: gotgan
      owner: gotgan                  # 앱 secret: pg-app-app (Spring SPRING_DATASOURCE_* 주입용)
