controller:
  admin:
    username: "admin"
    password: "__JENKINS_ADMIN_PASSWORD__"
  jenkinsUrl: "https://jenkins.gotgan.live"
  jenkinsUrlProtocol: "https"
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - pipeline-stage-view:latest
    - oic-auth:latest          # OIDC(Keycloak) 로그인 — DNS 개통 후 JCasC로 활성화
  ingress:
    enabled: true
    ingressClassName: nginx
    hostName: jenkins.gotgan.live
    annotations:
      cert-manager.io/cluster-issuer: gotgan-ca-issuer
    tls:
      - hosts: [jenkins.gotgan.live]
        secretName: jenkins-ingress-tls
  serviceType: ClusterIP
persistence:
  enabled: true
  storageClass: nfs-client
  size: 10Gi
agent:
  enabled: true               # Kubernetes cloud 동적 agent (Kaniko 빌드는 Jenkinsfile podTemplate로)

# Keycloak(platform realm) SSO — 적용 시 __JENKINS_OIDC_SECRET__ 치환.
# 주의: oic-auth 4.x는 escapeHatch를 JCasC 미지원 → 비상복구는 config.xml 백업으로.
controllerJCasCNote: "아래 configScripts.oidc-realm 은 controller.JCasC.configScripts 하위로 병합"
controller:
  JCasC:
    configScripts:
      oidc-realm: |
        jenkins:
          securityRealm:
            oic:
              clientId: "jenkins"
              clientSecret: "__JENKINS_OIDC_SECRET__"
              serverConfiguration:
                wellKnown:
                  wellKnownOpenIDConfigurationUrl: "https://auth.gotgan.live/realms/platform/.well-known/openid-configuration"
              userNameField: "preferred_username"
              groupsFieldName: "groups"
              postLogoutRedirectUrl: "https://jenkins.gotgan.live/"
