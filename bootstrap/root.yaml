# app-of-apps 루트 — argocd/ 의 자식 Application들을 동기화
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotgan-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dumbbelloper/gotgan-gitops.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
