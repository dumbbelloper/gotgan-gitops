apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotgan-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dumbbelloper/gotgan-gitops.git
    targetRevision: main
    path: apps/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: gotgan
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
